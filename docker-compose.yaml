services:
  netlab:
    image: "${NETLAB_IMAGE:-harbor.nangman.cloud/library/netlab:latest}"
    pull_policy: always
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      PORT: "${PORT:-8080}"
      TRUST_PROXY: "${TRUST_PROXY:-1}"
      VITE_SITE_URL: "${VITE_SITE_URL:-https://netlab.tools}"
      INDEXNOW_KEY: "${INDEXNOW_KEY:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CONSOLE_LOG_LEVEL: "${CONSOLE_LOG_LEVEL:-info}"
      FILE_LOG_LEVEL: "${FILE_LOG_LEVEL:-info}"
      LOG_PRETTY_CONSOLE: "${LOG_PRETTY_CONSOLE:-false}"
      API_RATE_LIMIT_WINDOW_MS: "${API_RATE_LIMIT_WINDOW_MS:-900000}"
      API_RATE_LIMIT_MAX: "${API_RATE_LIMIT_MAX:-300}"
      PING_RATE_LIMIT_WINDOW_MS: "${PING_RATE_LIMIT_WINDOW_MS:-900000}"
      PING_RATE_LIMIT_MAX: "${PING_RATE_LIMIT_MAX:-90}"
      PING_MAX_CONCURRENT_GLOBAL: "${PING_MAX_CONCURRENT_GLOBAL:-20}"
      PING_MAX_CONCURRENT_PER_IP: "${PING_MAX_CONCURRENT_PER_IP:-2}"
      DNS_RATE_LIMIT_WINDOW_MS: "${DNS_RATE_LIMIT_WINDOW_MS:-900000}"
      DNS_RATE_LIMIT_MAX: "${DNS_RATE_LIMIT_MAX:-60}"
      DNS_LOOKUP_MAX_CONCURRENT_GLOBAL: "${DNS_LOOKUP_MAX_CONCURRENT_GLOBAL:-20}"
      DNS_LOOKUP_MAX_CONCURRENT_PER_IP: "${DNS_LOOKUP_MAX_CONCURRENT_PER_IP:-3}"
      DNS_PROPAGATION_RATE_LIMIT_WINDOW_MS: "${DNS_PROPAGATION_RATE_LIMIT_WINDOW_MS:-900000}"
      DNS_PROPAGATION_RATE_LIMIT_MAX: "${DNS_PROPAGATION_RATE_LIMIT_MAX:-30}"
      DNS_PROPAGATION_MAX_CONCURRENT_GLOBAL: "${DNS_PROPAGATION_MAX_CONCURRENT_GLOBAL:-8}"
      DNS_PROPAGATION_MAX_CONCURRENT_PER_IP: "${DNS_PROPAGATION_MAX_CONCURRENT_PER_IP:-2}"
      DNS_PROPAGATION_QUERY_CONCURRENCY: "${DNS_PROPAGATION_QUERY_CONCURRENCY:-10}"
      DNS_PROPAGATION_QUERY_TIMEOUT_MS: "${DNS_PROPAGATION_QUERY_TIMEOUT_MS:-4000}"
      PORT_SCAN_RATE_LIMIT_WINDOW_MS: "${PORT_SCAN_RATE_LIMIT_WINDOW_MS:-900000}"
      PORT_SCAN_RATE_LIMIT_MAX: "${PORT_SCAN_RATE_LIMIT_MAX:-20}"
      PORT_SCAN_MAX_PORTS: "${PORT_SCAN_MAX_PORTS:-256}"
      PORT_SCAN_MAX_TIMEOUT_MS: "${PORT_SCAN_MAX_TIMEOUT_MS:-2000}"
      PORT_SCAN_MAX_CONCURRENT_GLOBAL: "${PORT_SCAN_MAX_CONCURRENT_GLOBAL:-4}"
      PORT_SCAN_MAX_CONCURRENT_PER_IP: "${PORT_SCAN_MAX_CONCURRENT_PER_IP:-1}"
      TRACE_MAX_CONCURRENT_GLOBAL: "${TRACE_MAX_CONCURRENT_GLOBAL:-12}"
      TRACE_MAX_CONCURRENT_PER_IP: "${TRACE_MAX_CONCURRENT_PER_IP:-2}"
      HTTP_INSPECTION_MAX_CONCURRENT_GLOBAL: "${HTTP_INSPECTION_MAX_CONCURRENT_GLOBAL:-16}"
      HTTP_INSPECTION_MAX_CONCURRENT_PER_IP: "${HTTP_INSPECTION_MAX_CONCURRENT_PER_IP:-3}"
      WHOIS_MAX_CONCURRENT_GLOBAL: "${WHOIS_MAX_CONCURRENT_GLOBAL:-12}"
      WHOIS_MAX_CONCURRENT_PER_IP: "${WHOIS_MAX_CONCURRENT_PER_IP:-2}"
      PACKET_CAPTURE_MAX_CONCURRENT_GLOBAL: "${PACKET_CAPTURE_MAX_CONCURRENT_GLOBAL:-4}"
      PACKET_CAPTURE_MAX_CONCURRENT_PER_IP: "${PACKET_CAPTURE_MAX_CONCURRENT_PER_IP:-1}"
      PACKET_CAPTURE_MAX_LOAD_PER_CPU_PERCENT: "${PACKET_CAPTURE_MAX_LOAD_PER_CPU_PERCENT:-90}"
      PACKET_CAPTURE_MIN_FREE_SYSTEM_MEMORY_MB: "${PACKET_CAPTURE_MIN_FREE_SYSTEM_MEMORY_MB:-384}"
      PACKET_CAPTURE_MAX_SYSTEM_MEMORY_UTILIZATION_PERCENT: "${PACKET_CAPTURE_MAX_SYSTEM_MEMORY_UTILIZATION_PERCENT:-92}"
      NETLAB_HTTP3_CURL_BINARY: "${NETLAB_HTTP3_CURL_BINARY:-/opt/netlab-http3/bin/curl}"
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-8080}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "netlab"

  watchtower:
    image: containrrr/watchtower:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "${WATCHTOWER_DOCKER_API_VERSION:-1.40}"
      WATCHTOWER_HTTP_API_UPDATE: "${WATCHTOWER_HTTP_API_UPDATE:-true}"
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN}"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: "netlab"
      WATCHTOWER_CLEANUP: "true"
    command:
      - --http-api-update
      - --label-enable
      - --scope
      - netlab
      - --cleanup
    ports:
      - "${WATCHTOWER_PORT:-18081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.centurylinklabs.watchtower.scope: "netlab"
