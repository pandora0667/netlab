services:
  netlab:
    image: "${NETLAB_IMAGE:-harbor.nangman.cloud/library/netlab:latest}"
    pull_policy: always
    init: true
    restart: unless-stopped
    environment:
      PORT: "${PORT:-8080}"
      TRUST_PROXY: "${TRUST_PROXY:-1}"
      VITE_SITE_URL: "${VITE_SITE_URL:-https://netlab.tools}"
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-8080}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "netlab"

  watchtower:
    image: containrrr/watchtower:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "${WATCHTOWER_DOCKER_API_VERSION:-1.40}"
      WATCHTOWER_HTTP_API_UPDATE: "${WATCHTOWER_HTTP_API_UPDATE:-true}"
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN}"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCOPE: "netlab"
      WATCHTOWER_CLEANUP: "true"
    command:
      - --http-api-update
      - --label-enable
      - --scope
      - netlab
      - --cleanup
    ports:
      - "${WATCHTOWER_PORT:-18081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.centurylinklabs.watchtower.scope: "netlab"
